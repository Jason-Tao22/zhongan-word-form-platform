server:
  port: 8080

spring:
  application:
    name: form-system
  datasource:
    url: ${DB_URL:jdbc:h2:file:${user.dir}/data/formdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;AUTO_SERVER=TRUE}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
  sql:
    init:
      mode: always
  h2:
    console:
      enabled: true
      path: /h2-console
  jackson:
    serialization:
      write-dates-as-timestamps: false
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

word-parser:
  base-url: http://localhost:8001
  timeout: 600000

template-storage:
  dir: ${user.dir}/data/template-sources
